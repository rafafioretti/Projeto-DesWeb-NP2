<main class="pagina-agendamento">

<h1>Cadastro de Pet</h1>

<div class="formularios reveal">

  <!-- FORMULÁRIO -->
  <div class="form1">

        <form action="" method="post" class="formCadastro">

        <h2>Dados do Tutor</h2>

        <label>Nome:</label><br>
        <input type="text"><br>

        <label>Telefone:</label><br>
        <input type="text"><br>

        <label>E-mail:</label><br>
        <input type="email"><br>

        <h2>Dados do Pet</h2>

        <label>Nome do pet:</label><br>
        <input type="text"><br>

        <label>Espécie:</label><br>
        <select>
            <option>Selecione...</option>
            <option>Cão</option>
            <option>Gato</option>
        </select><br>

        <label>Data de nascimento:</label><br>
        <input type="date"><br>

        <label>Sexo:</label>

        <div class="sexo">
        <label><input type="radio" name="sexo"> Macho</label>
        <label><input type="radio" name="sexo"> Fêmea</label>
        </div>

        <button type="reset">Limpar</button>

        </form>

  </div>

    <div class="direita">

        <h2>Cálculo de Frete</h2>

        <form>

            <label>Digite seu CEP:</label><br>
            <input type="text" id="cep"><br>

            <label>Tipo de entrega:</label><br>
            <select id="tipo">
            <option value="normal">Normal</option>
            <option value="rapida">Rápida</option>
            </select><br><br>

            <button type="button" onclick="calcularFrete()">Calcular Frete</button>

            <p id="resultado">Resultado aparecerá aqui.</p>

        </form>

</div> 

</div>

<div id="popupFrete" class="popup-frete" aria-hidden="true">
    <div class="popup-frete-conteudo">
        <h3>Frete calculado com sucesso</h3>
        <p id="mensagemPopup">Confira o valor do frete no resultado abaixo.</p>
        <button type="button" onclick="fecharPopupFrete()">Fechar</button>
    </div>
</div>
